databases:
  - name: cleanops-db
    plan: free
    databaseName: cleanops
    user: cleanops

services:
  - type: web
    name: cleanops-api
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://cleaning-operations-system.vercel.app,http://localhost:4200
      - key: SERVE_MEDIA
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: cleanops-db
          property: connectionString
