services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cleanops
      POSTGRES_USER: cleanops
      POSTGRES_PASSWORD: cleanops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cleanops -d cleanops"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media_data:
  static_data:
